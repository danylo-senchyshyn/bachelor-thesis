name: Build PDF

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-lang-czechslovak \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-plain-generic \
            texlive-bibtex-extra \
            texlive-science \
            biber \
            latexmk \
            make

      - name: Build thesis PDF
        run: |
          mkdir -p dist build build/chapters build/appendices
          latexmk thesis
          cp dist/thesis.pdf thesis.pdf
          # printable version: recompile with \printable macro
          latexmk -usepretex='\def\printable{}' thesis
          cp dist/thesis.pdf thesis-printable.pdf

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: |
            thesis.pdf
            thesis-printable.pdf
          retention-days: 90

      - name: Create/update release with PDF
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          body: |
            Automatically built from the latest commit on `master`.

            **Download:**
            - `thesis.pdf` — screen/ebook version (colored links)
            - `thesis-printable.pdf` — print version (no colored links)
          files: |
            thesis.pdf
            thesis-printable.pdf
          make_latest: true
          prerelease: false
